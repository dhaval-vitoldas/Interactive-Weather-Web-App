<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Weather App</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 30px; background-color: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0px 4px 6px rgba(0,0,0,0.1); display: inline-block; width: 90%; max-width: 600px; }
        input[type="text"] { padding: 10px; width: 60%; border-radius: 5px; border: 1px solid #ccc; }
        button { padding: 10px 15px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background-color: #218838; }
        .error { color: red; font-weight: bold; }
        .temp { font-size: 2.5em; font-weight: bold; color: #ff5722; margin: 10px 0; }
        #map { height: 350px; width: 100%; margin-top: 20px; border-radius: 10px; border: 1px solid #ccc; cursor: crosshair; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🌍 Interactive Weather App</h2>  
        <form method="POST">
            <input type="text" name="city" placeholder="Search by city name...">
            <button type="submit">Search</button>
        </form>
        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}
        
        {% if weather %}
            <h3>📍 {{ weather.city }}</h3>
            <p class="temp">{{ weather.temperature }}°C</p>
            <p><strong>Status:</strong> {{ weather.description }} | <strong>Humidity:</strong> {{ weather.humidity }}%</p>
            <hr>
        {% endif %}

        <p style="color: #666; font-size: 0.9em;">Or click anywhere on the map:</p>
        <div id="map"></div>
        
        <form id="mapForm" method="POST" style="display: none;">
            <input type="hidden" name="lat" id="latInput">
            <input type="hidden" name="lon" id="lonInput">
        </form>

    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([39.3999, -8.2245], 5);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        map.on('click', function(e) {
            document.getElementById('latInput').value = e.latlng.lat;
            document.getElementById('lonInput').value = e.latlng.lng;
            document.getElementById('mapForm').submit();
        });
    </script>
</body>
</html>
